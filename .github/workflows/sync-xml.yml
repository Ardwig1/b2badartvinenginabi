name: Daily XML Sync

on:
  schedule:
    # Test 1: 20:15 TSI (17:15 UTC)
    - cron: '15 17 * * *'
    # Test 2: 20:20 TSI (17:20 UTC)
    - cron: '20 17 * * *'
  workflow_dispatch:
    # Manual trigger enabled

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger XML Sync API
        run: |
          curl -X GET "https://enginb2b.vercel.app/api/cron/sync-xml" \
          -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
          -H "x-vercel-cron: 1"
