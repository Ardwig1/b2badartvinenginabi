name: Daily XML Sync

on:
  schedule:
    # 20:35 TSI (18:35 UTC)
    - cron: '35 18 * * *'
  workflow_dispatch:
    # Manual trigger enabled

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger XML Sync API
        run: |
          curl -X GET "https://enginb2b.vercel.app/api/cron/sync-xml" \
          -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
          -H "x-vercel-cron: 1"
