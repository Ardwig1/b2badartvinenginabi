name: Daily XML Sync

on:
  schedule:
    # 18:40 TSI (15:40 UTC)
    - cron: '40 15 * * *'
  workflow_dispatch:
    # Allows manual triggering from the Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger XML Sync API
        run: |
          curl -X GET "https://enginb2b.vercel.app/api/cron/sync-xml" \
          -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
          -H "x-vercel-cron: 1"
