name: Daily XML Sync

on:
  push:
    branches:
      - main
  schedule:
    # 03:00 TSI (01:00 UTC)
    - cron: '0 1 * * *'
  workflow_dispatch:
    # Manual trigger enabled

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger XML Sync API
        run: |
          curl -X GET "https://enginb2b.vercel.app/api/cron/sync-xml" \
          -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
          -H "x-vercel-cron: 1"
