name: Daily XML Sync

on:
  schedule:
    # Her gece 23:00 TR (20:00 UTC)
    - cron: '0 20 * * *'
  workflow_dispatch:
    # Manuel tetikleme

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger XML Sync API
        run: |
          curl -X GET "https://enginb2b.vercel.app/api/cron/sync-xml" \
          -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
          -H "x-vercel-cron: 1"
